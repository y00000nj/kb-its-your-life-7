<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form_fieldset</title>
  </head>
  <body>
    <form method="get" action="ex.html">
      <!-- method default=get action default=현재, 보통 백엔드 서버가 들어감 -->
      <fieldset>
        <legend>입력양식</legend>
        <table>
          <tr>
            <td><label name for="name">이름</label></td>
            <td><input id="name" name="name" type="text" /></td>
          </tr>
          <tr>
            <td><label name for="email">이메일</label></td>
            <td>
              <input id="email" name="email" value="test@abc.com" type="email" />
            </td>
          </tr>
          <td><input type="submit" /></td>
        </table>
      </fieldset>
    </form>
  </body>
</html>
