<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>d_c</title>
    <script>
      window.onload = function () {
        let c = document.getElementById('clock');

        setInterval(function () {
          let now = new Date();

          c.innerHTML = now;
        });
      };
    </script>
  </head>
  <body>
    <h1 id="clock"></h1>
  </body>
</html>
