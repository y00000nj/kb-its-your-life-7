<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pr</title>
  </head>
  <script>
    function callTentimes(callback) {
      for (let i = 0; i < 10; i++) {
        callback();
      }
    }

    let fun = function () {
      alert('함수 호출');
    };

    callTentimes(fun);
  </script>
  <body></body>
</html>
