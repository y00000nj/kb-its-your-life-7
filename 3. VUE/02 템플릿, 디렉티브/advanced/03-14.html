<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03-14</title>
  </head>
  <style>
    #list {
      width: 600px;
      border: 1px solid black;
      border-collapse: collapse;
    }
    #list td,
    #list th {
      border: 1px solid black;
      text-align: center;
    }
    #list > thead > tr {
      color: yellow;
      background-color: purple;
    }
  </style>
  <body>
    <div id="app">
      <table id="list">
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody id="contacts">
          <tr v-for="(contact, idx) in contacts" key="idx">
            <td>{{idx+1}}</td>
            <td>{{contact.name}}</td>
            <td>{{contact.tel}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'app',
        data() {
          return {
            contacts: [
              { no: 1111, name: 'RM', tel: '010-1111-1111' },
              { no: 2222, name: '정국', tel: '010-2222-2222' },
              { no: 3333, name: '제이홉', tel: '010-3333-3333' },
              { no: 4444, name: '슈가', tel: '010-4444-4444' },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
